### development

# baseURL: "https://14katsumix.github.io/tech-blog/"
baseURL: "http://localhost:1313/tech-blog/" # 開発環境用の URL

# Include drafts when building.
# buildDrafts: false
buildDrafts: true

permalinks:
  page:
    page: /:slug/
    100knocks: /100knocks/:slug/
    # 100knocks: /ds100knocks-alpha/:slug/
    # post: /p/:slug/
    # test: /test/:slug/
  section:
    100knocks: /100knocks/:sections[last]/
    # 100knocks: /100knocks/:sections[1:]/
    # 100knocks: /ds100knocks-alpha/:sections[last]/
    # 100knocks: /ds100knocks-alpha/
    # aaa: /aaa/:year/:month/
    # xxx: /xxx/:sections[1:]/

params:
  env: development
  mainSections:
    - "100knocks"
    - test
    - post

languages:
    ja:
        languageName: Japanese
        # title: Katsu Data Science Lab
        weight: 1
        params:
            sidebar:
                subtitle: "R と SQL で学ぶ、データ活用の実践スキル"
    en:
        languageName: English
        # title: Example Site
        weight: 1
        params:
            sidebar:
                subtitle: Real-World Data Mastery with R & SQL
    # zh-cn:
    #     languageName: 中文
    #     # title: 演示站点
    #     weight: 2
    #     params:
    #         sidebar:
    #             subtitle: 演示说明
