module:
  mounts:
  - excludeFiles: 
      - post
      # - test
      # - 100knocks/test
      # - categories
      # - test/books/**
    source: content
    target: content
  - source: static
    target: static
  - source: layouts
    target: layouts
  - source: data
    target: data
  - source: assets
    target: assets
  - source: i18n
    target: i18n
  - source: archetypes
    target: archetypes
