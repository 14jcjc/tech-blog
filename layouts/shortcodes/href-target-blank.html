{{- $class := .Get "class" | default "link" -}}
{{- $href := .Get "url" | default "#" -}}
{{- $target := .Get "target" | default "_blank" -}}
{{- $title := .Get "title" | default "" -}}
{{- $text := .Get "text" | default $href -}}
<a class="{{ $class }}" href="{{ $href }}" target="{{ $target }}" title="{{ $title }}" rel="noopener noreferrer">
  {{- $text -}}
</a>
